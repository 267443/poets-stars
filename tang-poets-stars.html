<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>唐朝诗人星空 - Tang Dynasty Poets Star Map</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-deep: #0a0a12;
            --bg-mid: #12121f;
            --star-glow: #fff8e7;
            --star-gold: #ffd700;
            --star-silver: #c0c0c0;
            --text-primary: #e8e4dc;
            --text-secondary: #a09a8a;
            --accent-red: #c94043;
            --accent-gold: #d4a853;
        }
        
        body {
            font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .ui-overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }
        
        .ui-overlay > * {
            pointer-events: auto;
        }
        
        .title-bar {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        .title-bar h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.5em;
            color: var(--text-primary);
            text-shadow: 0 0 30px rgba(212, 168, 83, 0.5);
            margin-bottom: 8px;
        }
        
        .title-bar p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
        }
        
        .poet-info-panel {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            background: linear-gradient(135deg, rgba(18, 18, 31, 0.95), rgba(10, 10, 18, 0.98));
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: 4px;
            padding: 30px;
            z-index: 100;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        
        .poet-info-panel.visible {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }
        
        .poet-info-panel .poet-name {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 8px;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(212, 168, 83, 0.3);
            padding-bottom: 15px;
        }
        
        .poet-info-panel .poet-era {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .poet-info-panel .era-tag {
            background: rgba(201, 64, 67, 0.2);
            color: var(--accent-red);
            padding: 4px 12px;
            border-radius: 2px;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
        }
        
        .poet-info-panel .poet-works {
            margin-bottom: 20px;
        }
        
        .poet-info-panel .section-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .poet-info-panel .works-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .poet-info-panel .work-tag {
            background: rgba(212, 168, 83, 0.1);
            border: 1px solid rgba(212, 168, 83, 0.2);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 2px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        
        .poet-info-panel .work-tag:hover {
            background: rgba(212, 168, 83, 0.2);
            border-color: var(--accent-gold);
        }
        
        .poet-info-panel .poet-relations {
            margin-top: 20px;
        }
        
        .poet-info-panel .relation-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .poet-info-panel .relation-item:last-child {
            border-bottom: none;
        }
        
        .poet-info-panel .relation-name {
            color: var(--accent-gold);
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            padding: 2px 4px;
            border-radius: 2px;
            text-shadow: 0 0 8px rgba(212, 168, 83, 0.6);
        }
        
        .poet-info-panel .relation-name.disabled {
            cursor: default;
            opacity: 0.5;
            color: var(--text-primary);
            text-shadow: none;
        }
        
        .poet-info-panel .relation-type {
            margin-left: auto;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 2px;
            background: rgba(150, 150, 200, 0.15);
            color: var(--text-secondary);
        }
        
        .poet-info-panel .relation-type.bright {
            background: rgba(255, 215, 0, 0.2);
            color: var(--star-gold);
        }
        
        .poet-info-panel .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .poet-info-panel .close-btn:hover {
            color: var(--accent-gold);
        }
        
        .poet-info-panel .poet-achievement {
            margin-bottom: 20px;
        }
        
        .poet-info-panel .achievement-tag {
            display: inline-block;
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.3), rgba(255, 215, 0, 0.2));
            color: var(--accent-gold);
            padding: 6px 16px;
            border-radius: 2px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            border: 1px solid rgba(255, 215, 0, 0.4);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .poet-info-panel .no-achievement {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-style: italic;
        }
        
        .work-fulltext-panel {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 400px;
            max-height: 70vh;
            background: linear-gradient(135deg, rgba(18, 18, 31, 0.95), rgba(10, 10, 18, 0.98));
            border: 1px solid rgba(212, 168, 83, 0.4);
            border-radius: 4px;
            padding: 30px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }
        
        .work-fulltext-panel.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(-50%) translateX(0);
        }
        
        .work-fulltext-panel .work-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(212, 168, 83, 0.3);
            padding-bottom: 15px;
        }
        
        .work-fulltext-panel .work-content {
            font-size: 1rem;
            line-height: 2;
            color: var(--text-primary);
            white-space: pre-wrap;
            text-align: center;
            font-family: 'ZCOOL XiaoWei', serif;
        }
        
        .work-fulltext-panel .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .work-fulltext-panel .close-btn:hover {
            color: var(--accent-gold);
        }
        
        .canvas-shifted {
            width: 50% !important;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .controls-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .controls-hint:hover {
            opacity: 1;
        }
        
        .controls-hint span {
            display: inline-block;
            margin: 0 15px;
        }
        
        .controls-hint .key {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 3px;
            margin-right: 5px;
        }
        
        .legend {
            position: fixed;
            left: 40px;
            bottom: 40px;
            z-index: 100;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .legend-dot.fame-1 { background: #fff; box-shadow: 0 0 15px #fff; }
        .legend-dot.fame-2 { background: #ffd700; box-shadow: 0 0 12px #ffd700; }
        .legend-dot.fame-3 { background: #c0c0c0; box-shadow: 0 0 8px #c0c0c0; }
        .legend-dot.fame-4 { background: #808080; box-shadow: 0 0 5px #808080; }
        
        .legend-line {
            width: 30px;
            height: 2px;
            margin-right: 10px;
        }
        
        .legend-line.strong { background: rgba(255, 255, 255, 0.8); }
        .legend-line.medium { background: rgba(255, 255, 255, 0.4); }
        .legend-line.weak { background: rgba(255, 255, 255, 0.15); }
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-text {
            font-size: 1.2rem;
            color: var(--text-secondary);
            letter-spacing: 0.3em;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading">
        <div class="loading-text">星辰正在汇聚...</div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="ui-overlay title-bar">
        <h1>大唐诗人星图</h1>
        <p>TANG DYNASTY POETS · 星辰般的诗魂</p>
    </div>
    
    <div class="poet-info-panel" id="poet-panel">
        <button class="close-btn" onclick="closePanel()">×</button>
        <div class="poet-name" id="poet-name"></div>
        <div class="poet-era">
            <span class="era-tag" id="poet-era"></span>
            <span id="poet-years"></span>
        </div>
        <div class="poet-achievement" id="poet-achievement">
            <span class="achievement-tag" id="poet-achievement-tag"></span>
        </div>
        <div class="poet-works">
            <div class="section-label">代表作品</div>
            <div class="works-list" id="poet-works"></div>
        </div>
        <div class="poet-relations" id="poet-relations">
            <div class="section-label">人物关系</div>
            <div id="relations-list"></div>
        </div>
    </div>
    
    <div class="work-fulltext-panel" id="work-panel">
        <button class="close-btn" onclick="closeWorkPanel()">×</button>
        <div class="work-title" id="work-title"></div>
        <div class="work-content" id="work-content"></div>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot fame-1"></div>诗仙/诗圣</div>
        <div class="legend-item"><div class="legend-dot fame-2"></div>名家</div>
        <div class="legend-item"><div class="legend-dot fame-3"></div>重要诗人</div>
        <div class="legend-item"><div class="legend-dot fame-4"></div>一般诗人</div>
        <div class="legend-item" style="margin-top: 20px;"><div class="legend-line strong"></div>挚友/至亲</div>
        <div class="legend-item"><div class="legend-line medium"></div>文坛同事</div>
        <div class="legend-item"><div class="legend-line weak"></div>泛泛之交</div>
    </div>
    
    <div class="controls-hint">
        <span><span class="key">拖拽</span>旋转视角</span>
        <span><span class="key">滚轮</span>缩放</span>
        <span><span class="key">点击</span>查看诗人</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const poetsData = [
            { id: 1, name: "王绩", era: "初唐", achievement: "田园诗人", works: [{ name: "《野望》", fullText: "东皋薄暮望，徙倚欲何依。\n树树皆秋色，山山唯落晖。\n牧人驱犊返，猎马带禽归。\n相顾无相识，长歌怀采薇。" }], fame: 3, relations: [{ name: "王勃", type: "亲属", strength: "strong" }] },
            { id: 2, name: "卢照邻", era: "初唐", achievement: "初唐四杰", works: [{ name: "《长安古意》", fullText: "长安大道连狭斜，青牛白马七香车。\n玉辇纵横过主第，金鞭络绎向侯家。\n龙衔宝盖承朝日，凤吐流苏带晚霞。\n百尺游丝争绕树，一群娇鸟共啼花。" }], fame: 3, relations: [{ name: "王勃", type: "文坛同事", strength: "medium" }, { name: "杨炯", type: "文坛同事", strength: "medium" }, { name: "骆宾王", type: "文坛同事", strength: "medium" }] },
            { id: 3, name: "骆宾王", era: "初唐", achievement: "初唐四杰", works: [{ name: "《咏鹅》", fullText: "鹅，鹅，鹅，曲项向天歌。\n白毛浮绿水，红掌拨清波。" }, { name: "《在狱咏蝉》", fullText: "西陆蝉声唱，南冠客思深。\n不堪玄鬓影，来对白头吟。\n露重飞难进，风多响易沉。\n无人信高洁，谁为表予心？" }], fame: 3, relations: [{ name: "王勃", type: "文坛同事", strength: "medium" }, { name: "杨炯", type: "文坛同事", strength: "medium" }, { name: "卢照邻", type: "文坛同事", strength: "medium" }] },
            { id: 4, name: "王勃", era: "初唐", achievement: "初唐四杰", works: [{ name: "《送杜少府之任蜀州》", fullText: "城阙辅三秦，风烟望五津。\n与君离别意，同是宦游人。\n海内存知己，天涯若比邻。\n无为在歧路，儿女共沾巾。" }, { name: "《滕王阁序》", fullText: "豫章故郡，洪都新府。\n星分翼轸，地接衡庐。\n落霞与孤鹜齐飞，秋水共长天一色。\n渔舟唱晚，响穷彭蠡之滨；\n雁阵惊寒，声断衡阳之浦。" }], fame: 3, relations: [{ name: "杨炯", type: "文坛同事", strength: "medium" }, { name: "卢照邻", type: "文坛同事", strength: "medium" }, { name: "骆宾王", type: "文坛同事", strength: "medium" }, { name: "王绩", type: "亲属", strength: "strong" }] },
            { id: 5, name: "杨炯", era: "初唐", achievement: "初唐四杰", works: [{ name: "《从军行》", fullText: "烽火照西京，心中自不平。\n牙璋辞凤阙，铁骑绕龙城。\n雪暗凋旗画，风多杂鼓声。\n宁为百夫长，胜作一书生。" }], fame: 3, relations: [{ name: "王勃", type: "文坛同事", strength: "medium" }, { name: "卢照邻", type: "文坛同事", strength: "medium" }, { name: "骆宾王", type: "文坛同事", strength: "medium" }] },
            { id: 6, name: "宋之问", era: "初唐", achievement: "", works: [{ name: "《度大庾岭》", fullText: "度岭方辞国，停轺一望家。\n魂随南翥鸟，泪尽北枝花。\n山雨初含霁，江云欲变霞。\n但令归有日，不敢恨长沙。" }], fame: 3, relations: [] },
            { id: 7, name: "贺知章", era: "初唐", achievement: "诗狂", works: [{ name: "《咏柳》", fullText: "碧玉妆成一树高，万条垂下绿丝绦。\n不知细叶谁裁出，二月春风似剪刀。" }, { name: "《回乡偶书》", fullText: "少小离家老大回，乡音无改鬓毛衰。\n儿童相见不相识，笑问客从何处来。" }], fame: 3, relations: [{ name: "李白", type: "挚友", strength: "strong" }, { name: "张若虚", type: "文坛同事", strength: "medium" }, { name: "张旭", type: "文坛同事", strength: "medium" }] },
            { id: 8, name: "张若虚", era: "初唐", achievement: "", works: [{ name: "《春江花月夜》", fullText: "春江潮水连海平，海上明月共潮生。\n滟滟随波千万里，何处春江无月明。\n江流宛转绕芳甸，月照花林皆似霰。\n空里流霜不觉飞，汀上白沙看不见。\n江天一色无纤尘，皎皎空中孤月轮。\n江畔何人初见月？江月何年初照人？\n人生代代无穷已，江月年年望相似。\n不知江月待何人，但见长江送流水。" }], fame: 3, relations: [{ name: "贺知章", type: "文坛同事", strength: "medium" }, { name: "张旭", type: "文坛同事", strength: "medium" }] },
            { id: 9, name: "陈子昂", era: "初唐", achievement: "唐诗革新", works: [{ name: "《登幽州台歌》", fullText: "前不见古人，后不见来者。\n念天地之悠悠，独怆然而涕下。" }], fame: 3, relations: [] },
            { id: 10, name: "杜审言", era: "初唐", achievement: "杜甫祖父", works: [{ name: "《和晋陵陆丞早春游望》", fullText: "独有宦游人，偏惊物候新。\n云霞出海曙，梅柳渡江春。\n淑气催黄鸟，晴光转绿蘋。\n忽闻歌古调，归思欲沾巾。" }], fame: 3, relations: [{ name: "杜甫", type: "亲属", strength: "strong" }] },
            { id: 11, name: "张九龄", era: "初唐", achievement: "宰相诗人", works: [{ name: "《望月怀远》", fullText: "海上生明月，天涯共此时。\n情人怨遥夜，竟夕起相思。\n灭烛怜光满，披衣觉露滋。\n不堪盈手赠，还寝梦佳期。" }], fame: 3, relations: [] },
            { id: 12, name: "王翰", era: "盛唐", achievement: "", works: [{ name: "《凉州词》", fullText: "葡萄美酒夜光杯，欲饮琵琶马上催。\n醉卧沙场君莫笑，古来征战几人回。" }], fame: 3, relations: [] },
            { id: 13, name: "王之涣", era: "盛唐", achievement: "", works: [{ name: "《登鹳雀楼》", fullText: "白日依山尽，黄河入海流。\n欲穷千里目，更上一层楼。" }, { name: "《凉州词》", fullText: "黄河远上白云间，一片孤城万仞山。\n羌笛何须怨杨柳，春风不度玉门关。" }], fame: 3, relations: [{ name: "王昌龄", type: "泛泛之交", strength: "weak" }, { name: "高适", type: "泛泛之交", strength: "weak" }] },
            { id: 14, name: "孟浩然", era: "盛唐", achievement: "诗隐", works: [{ name: "《春晓》", fullText: "春眠不觉晓，处处闻啼鸟。\n夜来风雨声，花落知多少。" }, { name: "《过故人庄》", fullText: "故人具鸡黍，邀我至田家。\n绿树村边合，青山郭外斜。\n开轩面场圃，把酒话桑麻。\n待到重阳日，还来就菊花。" }], fame: 2, relations: [{ name: "王维", type: "挚友", strength: "strong" }, { name: "李白", type: "挚友", strength: "strong" }] },
            { id: 15, name: "王昌龄", era: "盛唐", achievement: "七绝圣手", works: [{ name: "《出塞》", fullText: "秦时明月汉时关，万里长征人未还。\n但使龙城飞将在，不教胡马度阴山。" }, { name: "《芙蓉楼送辛渐》", fullText: "寒雨连江夜入吴，平明送客楚山孤。\n洛阳亲友如相问，一片冰心在玉壶。" }], fame: 3, relations: [{ name: "王之涣", type: "泛泛之交", strength: "weak" }, { name: "高适", type: "泛泛之交", strength: "weak" }] },
            { id: 16, name: "李白", era: "盛唐", achievement: "诗仙", works: [{ name: "《将进酒》", fullText: "君不见，黄河之水天上来，奔流到海不复回。\n君不见，高堂明镜悲白发，朝如青丝暮成雪。\n人生得意须尽欢，莫使金樽空对月。\n天生我材必有用，千金散尽还复来。\n烹羊宰牛且为乐，会须一饮三百杯。\n岑夫子，丹丘生，将进酒，杯莫停。\n与君歌一曲，请君为我倾耳听。\n钟鼓馔玉不足贵，但愿长醉不复醒。\n古来圣贤皆寂寞，惟有饮者留其名。\n陈王昔时宴平乐，斗酒十千恣欢谑。\n主人何为言少钱，径须沽取对君酌。\n五花马，千金裘，呼儿将出换美酒，与尔同销万古愁。" }, { name: "《蜀道难》", fullText: "噫吁嚱，危乎高哉！\n蜀道之难，难于上青天！\n蚕丛及鱼凫，开国何茫然！\n尔来四万八千岁，不与秦塞通人烟。\n西当太白有鸟道，可以横绝峨眉巅。\n地崩山摧壮士死，然后天梯石栈相钩连。\n上有六龙回日之高标，下有冲波逆折之回川。\n黄鹤之飞尚不得过，猿猱欲度愁攀援。" }, { name: "《静夜思》", fullText: "床前明月光，疑是地上霜。\n举头望明月，低头思故乡。" }, { name: "《望庐山瀑布》", fullText: "日照香炉生紫烟，遥看瀑布挂前川。\n飞流直下三千尺，疑是银河落九天。" }], fame: 1, relations: [{ name: "杜甫", type: "挚友", strength: "strong" }, { name: "孟浩然", type: "挚友", strength: "strong" }, { name: "贺知章", type: "挚友", strength: "strong" }, { name: "王维", type: "泛泛之交", strength: "weak" }] },
            { id: 17, name: "王维", era: "盛唐", achievement: "诗佛", works: [{ name: "《山居秋暝》", fullText: "空山新雨后，天气晚来秋。\n明月松间照，清泉石上流。\n竹喧归浣女，莲动下渔舟。\n随意春芳歇，王孙自可留。" }, { name: "《九月九日忆山东兄弟》", fullText: "独在异乡为异客，每逢佳节倍思亲。\n遥知兄弟登高处，遍插茱萸少一人。" }, { name: "《送元二使安西》", fullText: "渭城朝雨浥轻尘，客舍青青柳色新。\n劝君更尽一杯酒，西出阳关无故人。" }], fame: 1, relations: [{ name: "孟浩然", type: "挚友", strength: "strong" }, { name: "裴迪", type: "挚友", strength: "strong" }, { name: "李白", type: "泛泛之交", strength: "weak" }] },
            { id: 18, name: "杜甫", era: "盛唐", achievement: "诗圣", works: [{ name: "《春望》", fullText: "国破山河在，城春草木深。\n感时花溅泪，恨别鸟惊心。\n烽火连三月，家书抵万金。\n白头搔更短，浑欲不胜簪。" }, { name: "《登高》", fullText: "风急天高猿啸哀，渚清沙白鸟飞回。\n无边落木萧萧下，不尽长江滚滚来。\n万里悲秋常作客，百年多病独登台。\n艰难苦恨繁霜鬓，潦倒新停浊酒杯。" }, { name: "《茅屋为秋风所破歌》", fullText: "八月秋高风怒号，卷我屋上三重茅。\n茅飞渡江洒江郊，高者挂罥长林梢，下者飘转沉塘坳。\n南村群童欺我老无力，忍能对面为盗贼。\n公然抱茅入竹去，唇焦口燥呼不得，归来倚杖自叹息。\n俄顷风定云墨色，秋天漠漠向昏黑。\n布衾多年冷似铁，娇儿恶卧踏里裂。\n床头屋漏无干处，雨脚如麻未断绝。\n自经丧乱少睡眠，长夜沾湿何由彻！\n安得广厦千万间，大庇天下寒士俱欢颜！\n风雨不动安如山。\n呜呼！何时眼前突兀见此屋，吾庐独破受冻死亦足！" }], fame: 1, relations: [{ name: "李白", type: "挚友", strength: "strong" }, { name: "杜审言", type: "亲属", strength: "strong" }] },
            { id: 19, name: "高适", era: "盛唐", achievement: "边塞诗人", works: [{ name: "《别董大》", fullText: "千里黄云白日曛，北风吹雁雪纷纷。\n莫愁前路无知己，天下谁人不识君。" }, { name: "《燕歌行》", fullText: "汉家烟尘在东北，汉将辞家破残贼。\n男儿本自重横行，天子非常赐颜色。\n摐金伐鼓下榆关，旌旆逶迤碣石间。\n校尉羽书飞瀚海，单于猎火照狼山。\n山川萧条极边土，胡骑凭陵杂风雨。\n战士军前半死生，美人帐下犹歌舞。" }], fame: 2, relations: [{ name: "岑参", type: "泛泛之交", strength: "weak" }, { name: "王之涣", type: "泛泛之交", strength: "weak" }, { name: "王昌龄", type: "泛泛之交", strength: "weak" }] },
            { id: 20, name: "岑参", era: "盛唐", achievement: "边塞诗人", works: [{ name: "《白雪歌送武判官归京》", fullText: "北风卷地白草折，胡天八月即飞雪。\n忽如一夜春风来，千树万树梨花开。\n散入珠帘湿罗幕，狐裘不暖锦衾薄。\n将军角弓不得控，都护铁衣冷难着。\n瀚海阑干百丈冰，愁云惨淡万里凝。\n中军置酒饮归客，胡琴琵琶与羌笛。\n纷纷暮雪下辕门，风掣红旗冻不翻。\n轮台东门送君去，去时雪满天山路。\n山回路转不见君，雪上空留马行处。" }], fame: 2, relations: [{ name: "高适", type: "泛泛之交", strength: "weak" }] },
            { id: 21, name: "崔颢", era: "盛唐", achievement: "", works: [{ name: "《黄鹤楼》", fullText: "昔人已乘黄鹤去，此地空余黄鹤楼。\n黄鹤一去不复返，白云千载空悠悠。\n晴川历历汉阳树，芳草萋萋鹦鹉洲。\n日暮乡关何处是，烟波江上使人愁。" }], fame: 3, relations: [{ name: "李白", type: "泛泛之交", strength: "weak" }] },
            { id: 22, name: "王湾", era: "盛唐", achievement: "", works: [{ name: "《次北固山下》", fullText: "客路青山外，行舟绿水前。\n潮平两岸阔，风正一帆悬。\n海日生残夜，江春入旧年。\n乡书何处达，归雁洛阳边。" }], fame: 4, relations: [] },
            { id: 23, name: "张旭", era: "盛唐", achievement: "草圣", works: [{ name: "《桃花溪》", fullText: "隐隐飞桥隔野烟，石矾西畔问渔船。\n桃花尽日随流水，洞在清溪何处边。" }], fame: 3, relations: [{ name: "贺知章", type: "文坛同事", strength: "medium" }, { name: "张若虚", type: "文坛同事", strength: "medium" }] },
            { id: 24, name: "王冰", era: "盛唐", achievement: "", works: [{ name: "《野菊》", fullText: "晚艳出荒篱，冷香著秋水。\n忆向山中见，伴蛩石壁里。" }], fame: 4, relations: [] },
            { id: 25, name: "韩愈", era: "中唐", achievement: "文起八代之衰", works: [{ name: "《早春呈水部张十八员外》", fullText: "天街小雨润如酥，草色遥看近却无。\n最是一年春好处，绝胜烟柳满皇都。" }, { name: "《师说》", fullText: "古之学者必有师。师者，所以传道受业解惑也。\n人非生而知之者，孰能无惑？惑而不从师，其为惑也，终不解矣。\n生乎吾前，其闻道也固先乎吾，吾从而师之；\n生乎吾后，其闻道也亦先乎吾，吾从而师之。" }], fame: 2, relations: [{ name: "柳宗元", type: "挚友", strength: "strong" }, { name: "刘禹锡", type: "挚友", strength: "strong" }, { name: "贾岛", type: "师徒", strength: "strong" }, { name: "李贺", type: "师徒", strength: "strong" }, { name: "孟郊", type: "挚友", strength: "strong" }] },
            { id: 26, name: "柳宗元", era: "中唐", achievement: "唐宋八大家", works: [{ name: "《江雪》", fullText: "千山鸟飞绝，万径人踪灭。\n孤舟蓑笠翁，独钓寒江雪。" }, { name: "《捕蛇者说》", fullText: "永州之野产异蛇，黑质而白章；触草木，尽死；以啮人，无御之者。\n然得而腊之以为饵，可以已大风、挛踠、瘘、疠，去死肌，杀三虫。\n其始，太医以王命聚之，岁赋其二，募有能捕之者，当其租入。\n永之人争奔走焉。" }], fame: 2, relations: [{ name: "韩愈", type: "挚友", strength: "strong" }, { name: "刘禹锡", type: "挚友", strength: "strong" }] },
            { id: 27, name: "刘禹锡", era: "中唐", achievement: "诗豪", works: [{ name: "《陋室铭》", fullText: "山不在高，有仙则名。\n水不在深，有龙则灵。\n斯是陋室，惟吾德馨。\n苔痕上阶绿，草色入帘青。\n谈笑有鸿儒，往来无白丁。\n可以调素琴，阅金经。\n无丝竹之乱耳，无案牍之劳形。\n南阳诸葛庐，西蜀子云亭。\n孔子云：何陋之有？" }, { name: "《竹枝词》", fullText: "杨柳青青江水平，闻郎江上踏歌声。\n东边日出西边雨，道是无晴却有晴。" }, { name: "《乌衣巷》", fullText: "朱雀桥边野草花，乌衣巷口夕阳斜。\n旧时王谢堂前燕，飞入寻常百姓家。" }], fame: 2, relations: [{ name: "柳宗元", type: "挚友", strength: "strong" }, { name: "白居易", type: "挚友", strength: "strong" }, { name: "韩愈", type: "挚友", strength: "strong" }] },
            { id: 28, name: "白居易", era: "中唐", achievement: "诗魔", works: [{ name: "《琵琶行》", fullText: "浔阳江头夜送客，枫叶荻花秋瑟瑟。\n主人下马客在船，举酒欲饮无管弦。\n醉不成欢惨将别，别时茫茫江浸月。\n忽闻水上琵琶声，主人忘归客不发。\n寻声暗问弹者谁？琵琶声停欲语迟。\n移船相近邀相见，添酒回灯重开宴。\n千呼万唤始出来，犹抱琵琶半遮面。\n转轴拨弦三两声，未成曲调先有情。\n弦弦掩抑声声思，似诉平生不得志。\n低眉信手续续弹，说尽心中无限事。" }, { name: "《长恨歌》", fullText: "汉皇重色思倾国，御宇多年求不得。\n杨家有女初长成，养在深闺人未识。\n天生丽质难自弃，一朝选在君王侧。\n回眸一笑百媚生，六宫粉黛无颜色。\n春寒赐浴华清池，温泉水滑洗凝脂。\n侍儿扶起娇无力，始是新承恩泽时。\n云鬓花颜金步摇，芙蓉帐暖度春宵。\n春宵苦短日高起，从此君王不早朝。" }, { name: "《赋得古原草送别》", fullText: "离离原上草，一岁一枯荣。\n野火烧不尽，春风吹又生。\n远芳侵古道，晴翠接荒城。\n又送王孙去，萋萋满别情。" }], fame: 1, relations: [{ name: "元稹", type: "挚友", strength: "strong" }, { name: "刘禹锡", type: "挚友", strength: "strong" }] },
            { id: 29, name: "元稹", era: "中唐", achievement: "新乐府运动", works: [{ name: "《离思》", fullText: "曾经沧海难为水，除却巫山不是云。\n取次花丛懒回顾，半缘修道半缘君。" }, { name: "《菊花》", fullText: "秋丛绕舍似陶家，遍绕篱边日渐斜。\n不是花中偏爱菊，此花开尽更无花。" }], fame: 2, relations: [{ name: "白居易", type: "挚友", strength: "strong" }] },
            { id: 30, name: "贾岛", era: "中唐", achievement: "苦吟诗人", works: [{ name: "《寻隐者不遇》", fullText: "松下问童子，言师采药去。\n只在此山中，云深不知处。" }], fame: 3, relations: [{ name: "韩愈", type: "师徒", strength: "strong" }, { name: "孟郊", type: "挚友", strength: "strong" }] },
            { id: 31, name: "李贺", era: "中唐", achievement: "诗鬼", works: [{ name: "《雁门太守行》", fullText: "黑云压城城欲摧，甲光向日金鳞开。\n角声满天秋色里，塞上燕脂凝夜紫。\n半卷红旗临易水，霜重鼓寒声不起。\n报君黄金台上意，提携玉龙为君死。" }, { name: "《马诗》", fullText: "大漠沙如雪，燕山月似钩。\n何当金络脑，快走踏清秋。" }], fame: 2, relations: [{ name: "韩愈", type: "师徒", strength: "strong" }] },
            { id: 32, name: "孟郊", era: "中唐", achievement: "苦吟诗人", works: [{ name: "《游子吟》", fullText: "慈母手中线，游子身上衣。\n临行密密缝，意恐迟迟归。\n谁言寸草心，报得三春晖。" }], fame: 3, relations: [{ name: "韩愈", type: "挚友", strength: "strong" }, { name: "贾岛", type: "挚友", strength: "strong" }] },
            { id: 33, name: "张籍", era: "中唐", achievement: "新乐府", works: [{ name: "《节妇吟》", fullText: "君知妾有夫，赠妾双明珠。\n感君缠绵意，系在红罗襦。\n妾家高楼连苑起，良人执戟明光里。\n知君用心如日月，事夫誓拟同生死。\n还君明珠双泪垂，恨不相逢未嫁时。" }], fame: 3, relations: [{ name: "韩愈", type: "泛泛之交", strength: "weak" }, { name: "白居易", type: "泛泛之交", strength: "weak" }, { name: "王建", type: "泛泛之交", strength: "weak" }] },
            { id: 34, name: "王建", era: "中唐", achievement: "新乐府", works: [{ name: "《十五夜望月寄杜郎中》", fullText: "中庭地白树栖鸦，冷露无声湿桂花。\n今夜月明人尽望，不知秋思落谁家。" }], fame: 3, relations: [{ name: "张籍", type: "泛泛之交", strength: "weak" }] },
            { id: 35, name: "刘方平", era: "中唐", achievement: "", works: [{ name: "《月夜》", fullText: "更深月色半人家，北斗阑干南斗斜。\n今夜偏知春气暖，虫声新透绿窗纱。" }, { name: "《春怨》", fullText: "纱窗日落渐黄昏，金屋无人见泪痕。\n寂寞空庭春欲晚，梨花满地不开门。" }], fame: 4, relations: [] },
            { id: 36, name: "顾况", era: "中唐", achievement: "", works: [{ name: "《宫词》", fullText: "玉楼天半起笙歌，风送宫嫔笑语和。\n月殿影开闻夜漏，水精帘卷近秋河。" }], fame: 4, relations: [] },
            { id: 37, name: "卢仝", era: "中唐", achievement: "茶仙", works: [{ name: "《走笔谢孟谏议寄新茶》", fullText: "日高丈五睡正浓，军将打门惊周公。\n口云谏议送书信，白绢斜封三道印。\n开缄宛见谏议面，手阅月团三百片。\n闻道新年入山里，蛰虫惊动春风起。\n天子须尝阳羡茶，百草不敢先开花。" }], fame: 4, relations: [{ name: "韩愈", type: "挚友", strength: "strong" }] },
            { id: 38, name: "李益", era: "中唐", achievement: "边塞诗人", works: [{ name: "《夜上受降城闻笛》", fullText: "回乐峰前沙似雪，受降城外月如霜。\n不知何处吹芦管，一夜征人尽望乡。" }], fame: 3, relations: [] },
            { id: 39, name: "杜牧", era: "晚唐", achievement: "小杜", works: [{ name: "《清明》", fullText: "清明时节雨纷纷，路上行人欲断魂。\n借问酒家何处有，牧童遥指杏花村。" }, { name: "《山行》", fullText: "远上寒山石径斜，白云生处有人家。\n停车坐爱枫林晚，霜叶红于二月花。" }, { name: "《赤壁》", fullText: "折戟沉沙铁未销，自将磨洗认前朝。\n东风不与周郎便，铜雀春深锁二乔。" }], fame: 1, relations: [{ name: "李商隐", type: "挚友", strength: "strong" }] },
            { id: 40, name: "李商隐", era: "晚唐", achievement: "朦胧诗祖", works: [{ name: "《无题》", fullText: "相见时难别亦难，东风无力百花残。\n春蚕到死丝方尽，蜡炬成灰泪始干。\n晓镜但愁云鬓改，夜吟应觉月光寒。\n蓬山此去无多路，青鸟殷勤为探看。" }, { name: "《锦瑟》", fullText: "锦瑟无端五十弦，一弦一柱思华年。\n庄生晓梦迷蝴蝶，望帝春心托杜鹃。\n沧海月明珠有泪，蓝田日暖玉生烟。\n此情可待成追忆，只是当时已惘然。" }, { name: "《夜雨寄北》", fullText: "君问归期未有期，巴山夜雨涨秋池。\n何当共剪西窗烛，却话巴山夜雨时。" }], fame: 1, relations: [{ name: "杜牧", type: "挚友", strength: "strong" }, { name: "温庭筠", type: "挚友", strength: "strong" }] },
            { id: 41, name: "温庭筠", era: "晚唐", achievement: "花间词祖", works: [{ name: "《商山早行》", fullText: "晨起动征铎，客行悲故乡。\n鸡声茅店月，人迹板桥霜。\n槲叶落山路，枳花明驿墙。\n因思杜陵梦，凫雁满回塘。" }, { name: "《更漏子》", fullText: "玉炉香，红蜡泪，偏照画堂秋思。\n眉翠薄，鬓云残，夜长衾枕寒。\n梧桐树，三更雨，不道离情正苦。\n一叶叶，一声声，空阶滴到明。" }], fame: 2, relations: [{ name: "韦庄", type: "挚友", strength: "strong" }, { name: "李商隐", type: "挚友", strength: "strong" }, { name: "鱼玄机", type: "师徒", strength: "strong" }] },
            { id: 42, name: "韦庄", era: "晚唐", achievement: "花间词人", works: [{ name: "《菩萨蛮》", fullText: "人人尽说江南好，游人只合江南老。\n春水碧于天，画船听雨眠。\n垆边人似月，皓腕凝霜雪。\n未老莫还乡，还乡须断肠。" }, { name: "《秦妇吟》", fullText: "去年今日此门中，人面桃花相映红。\n人面不知何处去，桃花依旧笑春风。" }], fame: 2, relations: [{ name: "温庭筠", type: "挚友", strength: "strong" }] },
            { id: 43, name: "罗隐", era: "晚唐", achievement: "", works: [{ name: "《蜂》", fullText: "不论平地与山尖，无限风光尽被占。\n采得百花成蜜后，为谁辛苦为谁甜。" }, { name: "《自遣》", fullText: "得即高歌失即休，多愁多恨亦悠悠。\n今朝有酒今朝醉，明日愁来明日愁。" }], fame: 3, relations: [] },
            { id: 44, name: "杜荀鹤", era: "晚唐", achievement: "", works: [{ name: "《山中寡妇》", fullText: "夫因兵死守蓬茅，麻苎衣衫鬓发焦。\n桑柘废来犹纳税，田园荒后尚征苗。\n时挑野菜和根煮，旋斫生柴带叶烧。\n任是深山更深处，也应无计避征徭。" }, { name: "《春宫怨》", fullText: "早被蝉娟误，欲妆临镜慵。\n承恩不在貌，教妾若为容。\n风暖鸟声碎，日高花影重。\n年年越溪女，相忆采芙蓉。" }], fame: 4, relations: [] },
            { id: 45, name: "郑谷", era: "晚唐", achievement: "", works: [{ name: "《鹧鸪》", fullText: "暖戏烟芜锦翼齐，品流应得近山鸡。\n雨昏青草湖边过，花落黄陵庙里啼。\n游子乍闻征袖湿，佳人才唱翠眉低。\n相呼相应湘江阔，深竹浮萍泊岸西。" }], fame: 4, relations: [{ name: "齐己", type: "挚友", strength: "strong" }] },
            { id: 46, name: "鱼玄机", era: "晚唐", achievement: "女诗人", works: [{ name: "《闺怨》", fullText: "蘼芜盈手泣斜晖，闻道邻家夫婿归。\n别日南鸿才北去，今朝北雁又南飞。\n春去秋来相不忘，半床落月蛩声病。\n万里悲凉长淫淫，鸿来雁度无音息。" }, { name: "《江陵愁望有寄》", fullText: "枫叶千枝复万枝，江桥掩映暮帆迟。\n忆君心似西江水，日夜东流无歇时。" }], fame: 3, relations: [{ name: "温庭筠", type: "师徒", strength: "strong" }] },
            { id: 47, name: "韩偓", era: "晚唐", achievement: "", works: [{ name: "《已凉》", fullText: "碧阑干外绣帘垂，猩色屏风画折枝。\n八尺龙须方锦褥，已凉天气未寒时。" }], fame: 4, relations: [] },
            { id: 48, name: "李群玉", era: "晚唐", achievement: "", works: [{ name: "《黄陵庙》", fullText: "小姑洲北浦云边，二女啼妆自偶然。\n风露淡烟波媚，香车宝马满春天。\n我来不见绣旗影，庙古松杉半夕阳。" }], fame: 4, relations: [] },
            { id: 49, name: "杜秋娘", era: "晚唐", achievement: "", works: [{ name: "《金缕衣》", fullText: "劝君莫惜金缕衣，劝君惜取少年时。\n花开堪折直须折，莫待无花空折枝。" }], fame: 4, relations: [] },
            { id: 50, name: "聂夷中", era: "晚唐", achievement: "", works: [{ name: "《伤田家》", fullText: "二月卖新丝，五月粜新谷。\n医得眼前疮，剜却心头肉。\n我愿君王心，化作光明烛。\n不照绮罗筵，只照逃亡屋。" }], fame: 4, relations: [] },
            { id: 51, name: "秦韬玉", era: "晚唐", achievement: "", works: [{ name: "《贫女》", fullText: "蓬门未识绮罗香，拟托良媒益自伤。\n谁爱风流高格调，共怜时世俭梳妆。\n敢将十指夸针巧，不把双眉斗画长。\n苦恨年年压金线，为他人作嫁衣裳。" }], fame: 4, relations: [] },
            { id: 52, name: "来鹏", era: "晚唐", achievement: "", works: [{ name: "《偶题》", fullText: "一种蛾眉明月夜，南宫歌吹北宫愁。\n刘生首任轻千金，烈士由来轻死生。" }], fame: 4, relations: [] }
        ];

        let scene, camera, renderer;
        let stars = [];
        let starMeshes = [];
        let lines = [];
        let raycaster, mouse;
        let selectedPoet = null;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let sphereRotation = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 100;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            createPoetStars();
            
            const poetIdToStar = {};
            stars.forEach(star => {
                if (star.userData && star.userData.poet && star.userData.poet.id) {
                    poetIdToStar[star.userData.poet.id] = star;
                }
            });
            window.poetIdToStar = poetIdToStar;
            
            createConnections();
            addEventListeners();
            
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
            
            animate();
        }

        function createPoetStars() {
            const fameColors = {
                1: { color: 0xffffff, emissive: 0xffd700, intensity: 2.0 },
                2: { color: 0xffd700, emissive: 0xffa500, intensity: 1.5 },
                3: { color: 0xc0c0c0, emissive: 0x909090, intensity: 1.0 },
                4: { color: 0x808080, emissive: 0x606060, intensity: 0.6 }
            };
            
            const fameSizes = {
                1: 2.2,
                2: 1.8,
                3: 1.4,
                4: 1.0
            };

            poetsData.forEach((poet, index) => {
                const phi = Math.acos(-1 + (2 * index) / poetsData.length);
                const theta = Math.sqrt(poetsData.length * Math.PI) * phi;
                
                const radius = 40;
                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);
                
                const size = fameSizes[poet.fame];
                const colors = fameColors[poet.fame];
                
                const starGeometry = new THREE.CircleGeometry(size, 32);
                const starMaterial = new THREE.MeshBasicMaterial({
                    color: colors.color,
                    transparent: true,
                    opacity: 0.95,
                    side: THREE.DoubleSide
                });
                
                const star = new THREE.Mesh(starGeometry, starMaterial);
                star.position.set(x, y, z);
                star.lookAt(0, 0, 0);
                star.userData = { poet: poet };
                
                const glowGeometry = new THREE.CircleGeometry(size * 2, 32);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: colors.emissive,
                    transparent: true,
                    opacity: 0.2,
                    side: THREE.DoubleSide
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                glow.position.set(x, y, z);
                glow.lookAt(0, 0, 0);
                glow.userData = { poet: poet };
                
                const outerGlowGeometry = new THREE.CircleGeometry(size * 3, 32);
                const outerGlowMaterial = new THREE.MeshBasicMaterial({
                    color: colors.emissive,
                    transparent: true,
                    opacity: 0.08,
                    side: THREE.DoubleSide
                });
                const outerGlow = new THREE.Mesh(outerGlowGeometry, outerGlowMaterial);
                outerGlow.position.set(x, y, z);
                outerGlow.lookAt(0, 0, 0);
                outerGlow.userData = { poet: poet };
                
                stars.push(star);
                starMeshes.push(star, glow, outerGlow);
                scene.add(star);
                scene.add(glow);
                scene.add(outerGlow);
            });
        }

        function createConnections() {
            const relationStrengths = {
                strong: { opacity: 0.7 },
                medium: { opacity: 0.35 },
                weak: { opacity: 0.12 }
            };

            poetsData.forEach(poet => {
                poet.relations.forEach(relation => {
                    const targetPoet = poetsData.find(p => p.name === relation.name);
                    if (targetPoet) {
                        const sourceIndex = poetsData.indexOf(poet);
                        const targetIndex = poetsData.indexOf(targetPoet);
                        
                        if (sourceIndex < targetIndex) {
                            const sourcePhi = Math.acos(-1 + (2 * sourceIndex) / poetsData.length);
                            const sourceTheta = Math.sqrt(poetsData.length * Math.PI) * sourcePhi;
                            const targetPhi = Math.acos(-1 + (2 * targetIndex) / poetsData.length);
                            const targetTheta = Math.sqrt(poetsData.length * Math.PI) * targetPhi;
                            
                            const radius = 40;
                            const sourceX = radius * Math.sin(sourcePhi) * Math.cos(sourceTheta);
                            const sourceY = radius * Math.sin(sourcePhi) * Math.sin(sourceTheta);
                            const sourceZ = radius * Math.cos(sourcePhi);
                            
                            const targetX = radius * Math.sin(targetPhi) * Math.cos(targetTheta);
                            const targetY = radius * Math.sin(targetPhi) * Math.sin(targetTheta);
                            const targetZ = radius * Math.cos(targetPhi);
                            
                            const points = [
                                new THREE.Vector3(sourceX, sourceY, sourceZ),
                                new THREE.Vector3(targetX, targetY, targetZ)
                            ];
                            
                            const geometry = new THREE.BufferGeometry().setFromPoints(points);
                            const opacity = relationStrengths[relation.strength].opacity;
                            
                            const material = new THREE.LineBasicMaterial({
                                color: 0xffffff,
                                transparent: true,
                                opacity: opacity
                            });
                            
                            const line = new THREE.Line(geometry, material);
                            line.userData = { 
                                source: poet.name, 
                                target: relation.name, 
                                strength: relation.strength,
                                type: relation.type
                            };
                            
                            lines.push(line);
                            scene.add(line);
                        }
                    }
                });
            });
        }

        function addEventListeners() {
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('wheel', onMouseWheel);
            renderer.domElement.addEventListener('click', onClick);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = { x: event.clientX, y: event.clientY };
        }

        function onMouseMove(event) {
            if (isDragging) {
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;
                
                sphereRotation.y += deltaX * 0.005;
                sphereRotation.x += deltaY * 0.005;
                
                previousMousePosition = { x: event.clientX, y: event.clientY };
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseWheel(event) {
            camera.position.z += event.deltaY * 0.05;
            camera.position.z = Math.max(50, Math.min(200, camera.position.z));
        }

        function onClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(starMeshes);
            
            if (intersects.length > 0) {
                const clickedObject = intersects[0].object;
                if (clickedObject.userData && clickedObject.userData.poet) {
                    const poet = clickedObject.userData.poet;
                    navigateToPoet(poet.id);
                    showPoetInfo(poet);
                }
            }
        }

        function showPoetInfo(poet, skipCameraAnimation = false) {
            if (!skipCameraAnimation) {
                const targetStar = stars.find(star => star.userData.poet.id === poet.id);
                if (targetStar) {
                    const originalOpacity = targetStar.material.opacity;
                    let flashCount = 0;
                    const flashInterval = setInterval(() => {
                        targetStar.material.opacity = flashCount % 2 === 0 ? 1 : 0.5;
                        flashCount++;
                        if (flashCount >= 4) {
                            clearInterval(flashInterval);
                            targetStar.material.opacity = originalOpacity;
                        }
                    }, 100);
                }
            }
            
            selectedPoet = poet;
            
            document.getElementById('poet-name').textContent = poet.name;
            document.getElementById('poet-era').textContent = poet.era;
            document.getElementById('poet-years').textContent = '';
            
            const achievementTag = document.getElementById('poet-achievement-tag');
            if (poet.achievement && poet.achievement.trim() !== '') {
                achievementTag.textContent = poet.achievement;
                achievementTag.className = 'achievement-tag';
            } else {
                achievementTag.textContent = '无特定称号';
                achievementTag.className = 'no-achievement';
            }
            
            const worksContainer = document.getElementById('poet-works');
            worksContainer.innerHTML = '';
            poet.works.forEach((work, index) => {
                const tag = document.createElement('span');
                tag.className = 'work-tag';
                tag.textContent = work.name;
                tag.addEventListener('click', () => showWorkFullText(work));
                worksContainer.appendChild(tag);
            });
            
            const relationsContainer = document.getElementById('relations-list');
            relationsContainer.innerHTML = '';
            
            if (poet.relations && poet.relations.length > 0) {
                poet.relations.forEach(relation => {
                    const relatedPoet = poetsData.find(p => p.name === relation.name);
                    const hasStar = !!relatedPoet;
                    
                    const item = document.createElement('div');
                    item.className = 'relation-item';
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'relation-name' + (hasStar ? '' : ' disabled');
                    nameSpan.textContent = relation.name;
                    
                    if (hasStar) {
                        nameSpan.dataset.poetId = relatedPoet.id;
                        nameSpan.addEventListener('click', () => {
                            navigateToPoet(relatedPoet.id, true);
                        });
                    }
                    
                    const typeSpan = document.createElement('span');
                    typeSpan.className = 'relation-type' + (relation.strength === 'strong' ? ' bright' : '');
                    typeSpan.textContent = relation.type;
                    
                    item.appendChild(nameSpan);
                    item.appendChild(typeSpan);
                    relationsContainer.appendChild(item);
                });
            } else {
                relationsContainer.innerHTML = '<div class="relation-item"><span class="relation-name" style="color: var(--text-secondary);">没有记录的关系</span></div>';
            }
            
            document.getElementById('poet-panel').classList.add('visible');
            
            lines.forEach(line => {
                const originalOpacity = line.material.opacity;
                if (line.userData.source === poet.name || line.userData.target === poet.name) {
                    line.material.opacity = 1;
                    setTimeout(() => {
                        line.material.opacity = originalOpacity;
                    }, 3000);
                }
            });
        }
        
        function showWorkFullText(work) {
            const canvasContainer = document.getElementById('canvas-container');
            const workPanel = document.getElementById('work-panel');
            
            canvasContainer.classList.add('canvas-shifted');
            
            document.getElementById('work-title').textContent = work.name;
            if (work.fullText) {
                document.getElementById('work-content').textContent = work.fullText;
            } else {
                document.getElementById('work-content').textContent = '暂无该作品全文';
            }
            
            workPanel.classList.add('visible');
        }
        
        function closeWorkPanel() {
            const canvasContainer = document.getElementById('canvas-container');
            const workPanel = document.getElementById('work-panel');
            
            canvasContainer.classList.remove('canvas-shifted');
            workPanel.classList.remove('visible');
        }

        function closePanel() {
            document.getElementById('poet-panel').classList.remove('visible');
            closeWorkPanel();
            selectedPoet = null;
        }

        function navigateToPoet(poetId, fromRelationClick = false) {
            const targetStar = window.poetIdToStar[poetId];
            if (!targetStar) {
                return;
            }
            
            const targetPoet = targetStar.userData.poet;
            
            const starPosition = new THREE.Vector3();
            targetStar.getWorldPosition(starPosition);
            
            const targetDir = starPosition.clone().normalize();
            const cameraDir = new THREE.Vector3(0, 0, 1);
            
            const quaternion = new THREE.Quaternion();
            quaternion.setFromUnitVectors(targetDir, cameraDir);
            
            const euler = new THREE.Euler();
            euler.setFromQuaternion(quaternion);
            
            const targetRotationX = sphereRotation.x + euler.x;
            const targetRotationY = sphereRotation.y + euler.y;
            
            const startRotationX = sphereRotation.x;
            const startRotationY = sphereRotation.y;
            const startTime = Date.now();
            const animationDuration = 1200;
            
            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }
            
            function animateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / animationDuration, 1);
                const easedProgress = easeOutCubic(progress);
                
                sphereRotation.x = startRotationX + (targetRotationX - startRotationX) * easedProgress;
                sphereRotation.y = startRotationY + (targetRotationY - startRotationY) * easedProgress;
                
                if (progress < 1) {
                    requestAnimationFrame(animateCamera);
                } else {
                    highlightStar(targetStar);
                    if (fromRelationClick) {
                        showPoetInfo(targetPoet, true);
                    }
                }
            }
            
            animateCamera();
        }

        function highlightStar(targetStar) {
            const originalOpacity = targetStar.material.opacity;
            let flashCount = 0;
            const flashInterval = setInterval(() => {
                targetStar.material.opacity = flashCount % 2 === 0 ? 1 : 0.5;
                flashCount++;
                if (flashCount >= 6) {
                    clearInterval(flashInterval);
                    targetStar.material.opacity = originalOpacity;
                }
            }, 100);
            
            const originalScale = targetStar.scale.x;
            let scaleCount = 0;
            const scaleInterval = setInterval(() => {
                const scale = scaleCount % 2 === 0 ? originalScale * 1.5 : originalScale;
                targetStar.scale.setScalar(scale);
                scaleCount++;
                if (scaleCount >= 6) {
                    clearInterval(scaleInterval);
                    targetStar.scale.setScalar(originalScale);
                }
            }, 100);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            scene.rotation.x = sphereRotation.x;
            scene.rotation.y = sphereRotation.y;
            
            stars.forEach((star, index) => {
                const poet = star.userData.poet;
                const speed = poet.fame === 1 ? 0.004 : poet.fame === 2 ? 0.003 : poet.fame === 3 ? 0.002 : 0.001;
                const scale = poet.fame === 1 ? 0.3 : poet.fame === 2 ? 0.2 : poet.fame === 3 ? 0.15 : 0.1;
                const pulse = Math.sin(Date.now() * speed + index * 0.5) * scale + 1;
                star.scale.setScalar(pulse);
            });
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
