<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-deep: #0a0a12;
            --bg-mid: #12121f;
            --star-glow: #fff8e7;
            --star-gold: #ffd700;
            --star-silver: #c0c0c0;
            --text-primary: #e8e4dc;
            --text-secondary: #a09a8a;
            --accent-red: #c94043;
            --accent-gold: #d4a853;
        }
        
        body {
            font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .ui-overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }
        
        .ui-overlay > * {
            pointer-events: auto;
        }
        
        .title-bar {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        .title-bar h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.5em;
            color: var(--text-primary);
            text-shadow: 0 0 30px rgba(212, 168, 83, 0.5);
            margin-bottom: 8px;
        }
        
        .title-bar p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
        }
        
        .poet-info-panel {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            background: linear-gradient(135deg, rgba(18, 18, 31, 0.95), rgba(10, 10, 18, 0.98));
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: 4px;
            padding: 30px;
            z-index: 100;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        
        .poet-info-panel.visible {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }
        
        .poet-info-panel .poet-name {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 8px;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(212, 168, 83, 0.3);
            padding-bottom: 15px;
        }
        
        .poet-info-panel .poet-era {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .poet-info-panel .era-tag {
            background: rgba(201, 64, 67, 0.2);
            color: var(--accent-red);
            padding: 4px 12px;
            border-radius: 2px;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
        }
        
        .poet-info-panel .poet-works {
            margin-bottom: 20px;
        }
        
        .poet-info-panel .section-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .poet-info-panel .works-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .poet-info-panel .work-tag {
            background: rgba(212, 168, 83, 0.1);
            border: 1px solid rgba(212, 168, 83, 0.2);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 2px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        
        .poet-info-panel .work-tag:hover {
            background: rgba(212, 168, 83, 0.2);
            border-color: var(--accent-gold);
        }
        
        .poet-info-panel .poet-relations {
            margin-top: 20px;
        }
        
        .poet-info-panel .relation-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .poet-info-panel .relation-item:last-child {
            border-bottom: none;
        }
        
        .poet-info-panel .relation-name {
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .poet-info-panel .relation-type {
            margin-left: auto;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 2px;
            background: rgba(150, 150, 200, 0.15);
            color: var(--text-secondary);
        }
        
        .poet-info-panel .relation-type.bright {
            background: rgba(255, 215, 0, 0.2);
            color: var(--star-gold);
        }
        
        .poet-info-panel .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .poet-info-panel .close-btn:hover {
            color: var(--accent-gold);
        }
        
        .controls-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .controls-hint:hover {
            opacity: 1;
        }
        
        .controls-hint span {
            display: inline-block;
            margin: 0 15px;
        }
        
        .controls-hint .key {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 3px;
            margin-right: 5px;
        }
        
        .legend {
            position: fixed;
            left: 40px;
            bottom: 40px;
            z-index: 100;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .legend-dot.fame-1 { background: #fff; box-shadow: 0 0 15px #fff; }
        .legend-dot.fame-2 { background: #ffd700; box-shadow: 0 0 12px #ffd700; }
        .legend-dot.fame-3 { background: #c0c0c0; box-shadow: 0 0 8px #c0c0c0; }
        .legend-dot.fame-4 { background: #808080; box-shadow: 0 0 5px #808080; }
        
        .legend-line {
            width: 30px;
            height: 2px;
            margin-right: 10px;
        }
        
        .legend-line.strong { background: rgba(255, 255, 255, 0.8); }
        .legend-line.medium { background: rgba(255, 255, 255, 0.4); }
        .legend-line.weak { background: rgba(255, 255, 255, 0.15); }
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-text {
            font-size: 1.2rem;
            color: var(--text-secondary);
            letter-spacing: 0.3em;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>

            { id: 44, name: "杜荀鹤", era: "晚唐", works: ["《山中寡妇》", "《春宫怨》"], fame: 4, relations: [] },
            { id: 45, name: "郑谷", era: "晚唐", works: ["《鹧鸪》"], fame: 4, relations: [{ name: "齐己", type: "挚友", strength: "strong" }] },
            { id: 46, name: "鱼玄机", era: "晚唐", works: ["《闺怨》", "《江陵愁望有寄》"], fame: 3, relations: [{ name: "温庭筠", type: "师徒", strength: "strong" }] },
            { id: 47, name: "韩偓", era: "晚唐", works: ["《已凉》"], fame: 4, relations: [] },
            { id: 48, name: "李群玉", era: "晚唐", works: ["《黄陵庙》"], fame: 4, relations: [] },
            { id: 49, name: "杜秋娘", era: "晚唐", works: ["《金缕衣》"], fame: 4, relations: [] },
            { id: 50, name: "聂夷中", era: "晚唐", works: ["《伤田家》"], fame: 4, relations: [] },
            { id: 51, name: "秦韬玉", era: "晚唐", works: ["《贫女》"], fame: 4, relations: [] },
            { id: 52, name: "来鹏", era: "晚唐", works: ["《偶题》"], fame: 4, relations: [] }
        ];

        let scene, camera, renderer;
        let stars = [];
        let starMeshes = [];
        let lines = [];
        let raycaster, mouse;
        let selectedPoet = null;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let sphereRotation = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 100;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            createPoetStars();
            createConnections();
            addEventListeners();
            
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
            
            animate();
        }

        function createPoetStars() {
            const fameColors = {
                1: { color: 0xffffff, emissive: 0xffd700, intensity: 2.0 },
                2: { color: 0xffd700, emissive: 0xffa500, intensity: 1.5 },
                3: { color: 0xc0c0c0, emissive: 0x909090, intensity: 1.0 },
                4: { color: 0x808080, emissive: 0x606060, intensity: 0.6 }
            };
            
            const fameSizes = {
                1: 2.2,
                2: 1.8,
                3: 1.4,
                4: 1.0
            };

            poetsData.forEach((poet, index) => {
                const phi = Math.acos(-1 + (2 * index) / poetsData.length);
                const theta = Math.sqrt(poetsData.length * Math.PI) * phi;
                
                const radius = 40;
                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);
                
                const size = fameSizes[poet.fame];
                const colors = fameColors[poet.fame];
                
                const starGeometry = new THREE.CircleGeometry(size, 32);
                const starMaterial = new THREE.MeshBasicMaterial({
                    color: colors.color,
                    transparent: true,
                    opacity: 0.95,
                    side: THREE.DoubleSide
                });
                
                const star = new THREE.Mesh(starGeometry, starMaterial);
                star.position.set(x, y, z);
                star.lookAt(0, 0, 0);
                star.userData = { poet: poet };
                
                const glowGeometry = new THREE.CircleGeometry(size * 2, 32);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: colors.emissive,
                    transparent: true,
                    opacity: 0.2,
                    side: THREE.DoubleSide
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                glow.position.set(x, y, z);
                glow.lookAt(0, 0, 0);
                glow.userData = { poet: poet };
                
                const outerGlowGeometry = new THREE.CircleGeometry(size * 3, 32);
                const outerGlowMaterial = new THREE.MeshBasicMaterial({
                    color: colors.emissive,
                    transparent: true,
                    opacity: 0.08,
                    side: THREE.DoubleSide
                });
                const outerGlow = new THREE.Mesh(outerGlowGeometry, outerGlowMaterial);
                outerGlow.position.set(x, y, z);
                outerGlow.lookAt(0, 0, 0);
                outerGlow.userData = { poet: poet };
                
                stars.push(star);
                starMeshes.push(star, glow, outerGlow);
                scene.add(star);
                scene.add(glow);
                scene.add(outerGlow);
            });
        }

        function createConnections() {
            const relationStrengths = {
                strong: { opacity: 0.7 },
                medium: { opacity: 0.35 },
                weak: { opacity: 0.12 }
            };

            poetsData.forEach(poet => {
                poet.relations.forEach(relation => {
                    const targetPoet = poetsData.find(p => p.name === relation.name);
                    if (targetPoet) {
                        const sourceIndex = poetsData.indexOf(poet);
                        const targetIndex = poetsData.indexOf(targetPoet);
                        
                        if (sourceIndex < targetIndex) {
                            const sourcePhi = Math.acos(-1 + (2 * sourceIndex) / poetsData.length);
                            const sourceTheta = Math.sqrt(poetsData.length * Math.PI) * sourcePhi;
                            const targetPhi = Math.acos(-1 + (2 * targetIndex) / poetsData.length);
                            const targetTheta = Math.sqrt(poetsData.length * Math.PI) * targetPhi;
                            
                            const radius = 40;
                            const sourceX = radius * Math.sin(sourcePhi) * Math.cos(sourceTheta);
                            const sourceY = radius * Math.sin(sourcePhi) * Math.sin(sourceTheta);
                            const sourceZ = radius * Math.cos(sourcePhi);
                            
                            const targetX = radius * Math.sin(targetPhi) * Math.cos(targetTheta);
                            const targetY = radius * Math.sin(targetPhi) * Math.sin(targetTheta);
                            const targetZ = radius * Math.cos(targetPhi);
                            
                            const points = [
                                new THREE.Vector3(sourceX, sourceY, sourceZ),
                                new THREE.Vector3(targetX, targetY, targetZ)
                            ];
                            
                            const geometry = new THREE.BufferGeometry().setFromPoints(points);
                            const opacity = relationStrengths[relation.strength].opacity;
                            
                            const material = new THREE.LineBasicMaterial({
                                color: 0xffffff,
                                transparent: true,
                                opacity: opacity
                            });
                            
                            const line = new THREE.Line(geometry, material);
                            line.userData = { 
                                source: poet.name, 
                                target: relation.name, 
                                strength: relation.strength,
                                type: relation.type
                            };
                            
                            lines.push(line);
                            scene.add(line);
                        }
                    }
                });
            });
        }

        function addEventListeners() {
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('wheel', onMouseWheel);
            renderer.domElement.addEventListener('click', onClick);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = { x: event.clientX, y: event.clientY };
        }

        function onMouseMove(event) {
            if (isDragging) {
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;
                
                sphereRotation.y += deltaX * 0.005;
                sphereRotation.x += deltaY * 0.005;
                
                previousMousePosition = { x: event.clientX, y: event.clientY };
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseWheel(event) {
            camera.position.z += event.deltaY * 0.05;
            camera.position.z = Math.max(50, Math.min(200, camera.position.z));
        }

        function onClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(starMeshes);
            
            if (intersects.length > 0) {
                const clickedObject = intersects[0].object;
                if (clickedObject.userData && clickedObject.userData.poet) {
                    showPoetInfo(clickedObject.userData.poet);
                }
            }
        }

        function showPoetInfo(poet) {
            selectedPoet = poet;
            
            document.getElementById('poet-name').textContent = poet.name;
            document.getElementById('poet-era').textContent = poet.era;
            document.getElementById('poet-years').textContent = '';
            
            const worksContainer = document.getElementById('poet-works');
            worksContainer.innerHTML = '';
            poet.works.forEach(work => {
                const tag = document.createElement('span');
                tag.className = 'work-tag';
                tag.textContent = work;
                worksContainer.appendChild(tag);
            });
            
            const relationsContainer = document.getElementById('relations-list');
            relationsContainer.innerHTML = '';
            
            if (poet.relations && poet.relations.length > 0) {
                poet.relations.forEach(relation => {
                    const item = document.createElement('div');
                    item.className = 'relation-item';
                    item.innerHTML = `
                        <span class="relation-name">${relation.name}</span>
                        <span class="relation-type ${relation.strength === 'strong' ? 'bright' : ''}">${relation.type}</span>
                    `;
                    relationsContainer.appendChild(item);
                });
            } else {
                relationsContainer.innerHTML = '<div class="relation-item"><span class="relation-name" style="color: var(--text-secondary);">没有记录的关系</span></div>';
            }
            
            document.getElementById('poet-panel').classList.add('visible');
        }

        function closePanel() {
            document.getElementById('poet-panel').classList.remove('visible');
            selectedPoet = null;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            scene.rotation.x = sphereRotation.x;
            scene.rotation.y = sphereRotation.y;
            
            stars.forEach((star, index) => {
                const pulse = Math.sin(Date.now() * 0.002 + index * 0.5) * 0.15 + 1;
                star.scale.setScalar(pulse);
            });
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
