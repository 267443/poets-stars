        function filterStars() {
            const noFameSelected = activeFameLevels.length === 0;
            
            function shouldShowPoet(poet) {
                if (noFameSelected) {
                    return false;
                }
                const fameMatch = activeFameLevels.includes(poet.fame);
                return fameMatch;
            }
            
            function shouldShowGeneral(general) {
                if (noFameSelected) {
                    return false;
                }
                const fameMatch = activeFameLevels.includes(general.fame);
                return fameMatch;
            }
            
            const allStars = [...tangStars, ...songStars, ...generalStars, ...songGeneralStars, ...mingGeneralStars, ...emperorStars];
            const allStarMeshes = [...tangStarMeshes, ...songStarMeshes, ...generalStarMeshes, ...songGeneralStarMeshes, ...mingGeneralStarMeshes, ...emperorStarMeshes];
            const allLines = [...tangLines, ...songLines, ...generalLines, ...songGeneralLines, ...mingGeneralLines, ...emperorLines];
            
            allStars.forEach(star => {
                if (star.userData && star.userData.poet) {
                    star.visible = noFameSelected ? false : shouldShowPoet(star.userData.poet);
                } else if (star.userData && star.userData.general) {
                    star.visible = noFameSelected ? false : shouldShowGeneral(star.userData.general);
                } else if (star.userData && star.userData.emperor) {
                    star.visible = noFameSelected ? false : activeFameLevels.includes(star.userData.emperor.fame);
                }
            });
            
            allStarMeshes.forEach(mesh => {
                if (mesh.userData && mesh.userData.poet) {
                    mesh.visible = noFameSelected ? false : shouldShowPoet(mesh.userData.poet);
                } else if (mesh.userData && mesh.userData.general) {
                    mesh.visible = noFameSelected ? false : shouldShowGeneral(mesh.userData.general);
                } else if (mesh.userData && mesh.userData.emperor) {
                    mesh.visible = noFameSelected ? false : activeFameLevels.includes(mesh.userData.emperor.fame);
                }
            });
            
            tangStars.forEach(star => {
                if (noFameSelected) {
                    star.visible = false;
                }
            });
            songStars.forEach(star => {
                if (noFameSelected) {
                    star.visible = false;
                }
            });
            generalStars.forEach(star => {
                if (noFameSelected) {
                    star.visible = false;
                }
            });
            songGeneralStars.forEach(star => {
                if (noFameSelected) {
                    star.visible = false;
                }
            });
            mingGeneralStars.forEach(star => {
                if (noFameSelected) {
                    star.visible = false;
                }
            });
            emperorStars.forEach(star => {
                if (noFameSelected) {
                    star.visible = false;
                }
            });

            tangStarMeshes.forEach(mesh => {
                if (noFameSelected) {
                    mesh.visible = false;
                }
            });
            songStarMeshes.forEach(mesh => {
                if (noFameSelected) {
                    mesh.visible = false;
                }
            });
            generalStarMeshes.forEach(mesh => {
                if (noFameSelected) {
                    mesh.visible = false;
                }
            });
            songGeneralStarMeshes.forEach(mesh => {
                if (noFameSelected) {
                    mesh.visible = false;
                }
            });
            mingGeneralStarMeshes.forEach(mesh => {
                if (noFameSelected) {
                    mesh.visible = false;
                }
            });
            emperorStarMeshes.forEach(mesh => {
                if (noFameSelected) {
                    mesh.visible = false;
                }
            });

            const currentStars = getCurrentStars();
            const currentStarMeshes = getCurrentStarMeshes();
            const currentLines = getCurrentLines();
            const currentPoetsData = getCurrentPoetsData();
            
            // 先根据noFameSelected设置所有连线的可见性
            if (noFameSelected) {
                tangLines.forEach(line => line.visible = false);
                songLines.forEach(line => line.visible = false);
                generalLines.forEach(line => line.visible = false);
                songGeneralLines.forEach(line => line.visible = false);
                mingGeneralLines.forEach(line => line.visible = false);
            }
            
            currentStars.forEach(star => {
                if (star.userData && star.userData.poet) {
                    star.visible = shouldShowPoet(star.userData.poet);
                } else if (star.userData && star.userData.general) {
                    star.visible = shouldShowGeneral(star.userData.general);
                }
            });
            
            currentStarMeshes.forEach(mesh => {
                if (mesh.userData && mesh.userData.poet) {
                    mesh.visible = shouldShowPoet(mesh.userData.poet);
                } else if (mesh.userData && mesh.userData.general) {
                    mesh.visible = shouldShowGeneral(mesh.userData.general);
                }
            });
            
            currentLines.forEach(line => {
                if (line.userData && line.userData.source && line.userData.target) {
                    // 当noFameSelected为true时，确保所有连线都不可见
                    if (noFameSelected) {
                        line.visible = false;
                        return;
                    }
                    
                    const sourcePoet = currentPoetsData.find(p => p.name === line.userData.source);
                    const targetPoet = currentPoetsData.find(p => p.name === line.userData.target);
                    if (sourcePoet && targetPoet) {
                        line.visible = shouldShowPoet(sourcePoet) && shouldShowPoet(targetPoet);
                    } else if (currentCategory === 'general') {
                        const sourceGeneral = tangGenerals.find(g => g.name === line.userData.source);
                        const targetGeneral = tangGenerals.find(g => g.name === line.userData.target);
                        if (sourceGeneral && targetGeneral) {
                            line.visible = shouldShowGeneral(sourceGeneral) && shouldShowGeneral(targetGeneral);
                        }
                    } else if (currentCategory === 'song-general') {
                        const sourceGeneral = songGenerals.find(g => g.name === line.userData.source);
                        const targetGeneral = songGenerals.find(g => g.name === line.userData.target);
                        if (sourceGeneral && targetGeneral) {
                            line.visible = shouldShowGeneral(sourceGeneral) && shouldShowGeneral(targetGeneral);
                        }
                    } else if (line.userData.type === 'ming-general') {
                        const sourceGeneral = mingGenerals.find(g => g.name === line.userData.source);
                        const targetGeneral = mingGenerals.find(g => g.name === line.userData.target);
                        if (sourceGeneral && targetGeneral) {
                            line.visible = shouldShowGeneral(sourceGeneral) && shouldShowGeneral(targetGeneral);
                        }
                    }
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = { x: event.clientX, y: event.clientY };
        }

        function onMouseMove(event) {
            if (isDragging) {
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;
                
                sphereRotation.y += deltaX * 0.005;
                sphereRotation.x += deltaY * 0.005;
                
                previousMousePosition = { x: event.clientX, y: event.clientY };
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseWheel(event) {
            camera.position.z += event.deltaY * 0.05;
            camera.position.z = Math.max(50, Math.min(200, camera.position.z));
        }

        function onClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const currentStarMeshes = getCurrentStarMeshes();
            const intersects = raycaster.intersectObjects(currentStarMeshes);
            
            if (intersects.length > 0) {
                const clickedObject = intersects[0].object;
                if (clickedObject.userData) {
                    if (clickedObject.userData.poet && clickedObject.visible) {
                        const poet = clickedObject.userData.poet;
                        navigateToPoet(poet.id);
                        showPoetInfo(poet);
                    } else if (clickedObject.userData.general && clickedObject.visible) {
                        const general = clickedObject.userData.general;
                        navigateToPoet(general.id);
                        showPoetInfo(general);
                    } else if (clickedObject.userData.emperor && clickedObject.visible) {
                        const emperor = clickedObject.userData.emperor;
                        navigateToPoet(emperor.id);
                        showPoetInfo(emperor);
                    }
                }
            }
        }

        function showPoetInfo(poetOrGeneral, skipCameraAnimation = false) {
            const currentStars = getCurrentStars();
            const currentPoetsData = getCurrentPoetsData();
            const isGeneral = poetOrGeneral.id >= 1000 && poetOrGeneral.id < 3000;
            const isEmperor = poetOrGeneral.id >= 3000;
            const poet = !isGeneral && !isEmperor ? poetOrGeneral : null;
            const general = isGeneral ? poetOrGeneral : null;
            const emperor = isEmperor ? poetOrGeneral : null;
            
            if (!skipCameraAnimation) {
                let targetStar = null;
                if (!isGeneral && !isEmperor) {
                    targetStar = currentStars.find(star => star.userData && star.userData.poet && star.userData.poet.id === poet.id);
                } else if (isGeneral) {
                    targetStar = currentStars.find(star => star.userData && star.userData.general && star.userData.general.id === general.id);
                } else if (isEmperor) {
                    targetStar = currentStars.find(star => star.userData && star.userData.emperor && star.userData.emperor.id === emperor.id);
                }
                if (targetStar) {
                    const originalOpacity = targetStar.material.opacity;
                    let flashCount = 0;
                    const flashInterval = setInterval(() => {
                        targetStar.material.opacity = flashCount % 2 === 0 ? 1 : 0.5;
                        flashCount++;
                        if (flashCount >= 4) {
                            clearInterval(flashInterval);
                            targetStar.material.opacity = originalOpacity;
                        }
                    }, 100);
                }
            }
            
            selectedPoet = poetOrGeneral;
            
            document.getElementById('poet-name').textContent = poetOrGeneral.name;
            document.getElementById('poet-era').textContent = poetOrGeneral.era;
            document.getElementById('poet-years').textContent = '';
            
            const achievementTag = document.getElementById('poet-achievement-tag');
            if (poetOrGeneral.achievement && poetOrGeneral.achievement.trim() !== '') {
                achievementTag.textContent = poetOrGeneral.achievement;
                achievementTag.className = 'achievement-tag';
            } else {
                achievementTag.textContent = '无特定称号';
                achievementTag.className = 'no-achievement';
            }
            
            const worksContainer = document.getElementById('poet-works');
            worksContainer.innerHTML = '';
            
            // 判断是将星、诗人还是帝王
            const sectionLabel = worksContainer.parentElement.querySelector('.section-label');
            if (sectionLabel) {
                if (isGeneral) {
                    sectionLabel.textContent = '参加的战役';
                } else if (isEmperor) {
                    sectionLabel.textContent = '主要功绩';
                } else {
                    sectionLabel.textContent = '代表作品';
                }
            }
            
            if (isGeneral && poetOrGeneral.battles && poetOrGeneral.battles.length > 0) {
                // 将星显示战役
                poetOrGeneral.battles.forEach((battle, index) => {
                    const tag = document.createElement('span');
                    tag.className = 'work-tag';
                    tag.textContent = battle.name;
                    tag.addEventListener('click', () => showBattleDescription(battle));
                    worksContainer.appendChild(tag);
                });
            } else if (isEmperor && poetOrGeneral.works && poetOrGeneral.works.length > 0) {
                // 帝王显示功绩
                poetOrGeneral.works.forEach((work, index) => {
                    const tag = document.createElement('span');
                    tag.className = 'work-tag';
                    tag.textContent = work.name;
                    tag.addEventListener('click', () => showWorkFullText(work));
                    worksContainer.appendChild(tag);
                });
            } else if (!isGeneral && !isEmperor && poetOrGeneral.works && poetOrGeneral.works.length > 0) {
                // 诗人显示作品
                poetOrGeneral.works.forEach((work, index) => {
                    const tag = document.createElement('span');
                    tag.className = 'work-tag';
                    tag.textContent = work.name;
                    tag.addEventListener('click', () => showWorkFullText(work));
                    worksContainer.appendChild(tag);
                });
            } else {
                if (isGeneral) {
                    worksContainer.innerHTML = '<span class="no-works">无记录战役</span>';
                } else if (isEmperor) {
                    worksContainer.innerHTML = '<span class="no-works">无记录功绩</span>';
                } else {
                    worksContainer.innerHTML = '<span class="no-works">无代表作品</span>';
                }
            }
            
            const relationsContainer = document.getElementById('relations-list');
            relationsContainer.innerHTML = '';
            
            if (poetOrGeneral.relations && poetOrGeneral.relations.length > 0) {
                poetOrGeneral.relations.forEach(relation => {
                    const relatedPoet = currentPoetsData.find(p => p.name === relation.name);
                    const hasStar = !!relatedPoet;
                    
                    const item = document.createElement('div');
                    item.className = 'relation-item';
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'relation-name' + (hasStar ? '' : ' disabled');
                    nameSpan.textContent = relation.name;
                    
                    if (hasStar) {
                        nameSpan.dataset.poetId = relatedPoet.id;
                        nameSpan.addEventListener('click', () => {
                            navigateToPoet(relatedPoet.id, true);
                            const isTargetGeneral = relatedPoet.id >= 1000 && relatedPoet.id < 3000;
                            const isTargetEmperor = relatedPoet.id >= 3000;
                            if (isTargetGeneral) {
                                const targetGeneral = relatedPoet;
                                showPoetInfo(targetGeneral, true);
                            } else if (isTargetEmperor) {
                                const targetEmperor = relatedPoet;
                                showPoetInfo(targetEmperor, true);
                            } else {
                                const targetPoet = relatedPoet;
                                showPoetInfo(targetPoet, true);
                            }
                        });
                    }
                    
                    const typeSpan = document.createElement('span');
                    typeSpan.className = 'relation-type' + (relation.strength === 'strong' ? ' bright' : '');
                    typeSpan.textContent = relation.type;
                    
                    item.appendChild(nameSpan);
                    item.appendChild(typeSpan);
                    relationsContainer.appendChild(item);
                });
            } else {
                relationsContainer.innerHTML = '<div class="relation-item"><span class="relation-name" style="color: var(--text-secondary);">没有记录的关系</span></div>';
            }
            
            document.getElementById('poet-panel').classList.add('visible');
            
            const currentLines = getCurrentLines();
            currentLines.forEach(line => {
                const originalOpacity = line.material.opacity;
                if (line.userData.source === poetOrGeneral.name || line.userData.target === poetOrGeneral.name) {
                    line.material.opacity = 1;
                    setTimeout(() => {
                        line.material.opacity = originalOpacity;
                    }, 3000);
                }
            });
        }
        
        function showWorkFullText(work) {
            const canvasContainer = document.getElementById('canvas-container');
            const workPanel = document.getElementById('work-panel');
            
            canvasContainer.classList.add('canvas-shifted');
            
            document.getElementById('work-title').textContent = work.name;
            if (work.fullText) {
                document.getElementById('work-content').textContent = work.fullText;
            } else {
                document.getElementById('work-content').textContent = '暂无该作品全文';
            }
            
            workPanel.classList.add('visible');
        }
        
        function showBattleDescription(battle) {
            const canvasContainer = document.getElementById('canvas-container');
            const workPanel = document.getElementById('work-panel');
            
            canvasContainer.classList.add('canvas-shifted');
            
            document.getElementById('work-title').textContent = battle.name;
            if (battle.description) {
                document.getElementById('work-content').textContent = battle.description;
            } else {
                document.getElementById('work-content').textContent = '暂无该战役介绍';
            }
            
            workPanel.classList.add('visible');
        }
        
        function closeWorkPanel() {
            const canvasContainer = document.getElementById('canvas-container');
            const workPanel = document.getElementById('work-panel');
            
            canvasContainer.classList.remove('canvas-shifted');
            workPanel.classList.remove('visible');
        }

        function closePanel() {
            document.getElementById('poet-panel').classList.remove('visible');
            closeWorkPanel();
            selectedPoet = null;
        }

        function navigateToPoet(poetId, fromRelationClick = false) {
            let prefix = '';
            if (currentCategory === 'general' && currentDynasty === 'ming') {
                prefix = 'ming_general_';
            } else if (currentCategory === 'general') {
                prefix = 'tang_general_';
            } else if (currentCategory === 'song-general') {
                prefix = 'song_general_';
            } else if (currentDynasty === 'ming') {
                prefix = 'ming_general_';
            } else if (currentCategory === 'emperor') {
                prefix = 'emperor_';
            } else if (currentCategory === 'poet') {
                prefix = currentDynasty === 'song' ? 'song_poet_' : 'tang_poet_';
            }
            const key = prefix + poetId;
            const targetStar = window.poetIdToStar[key];
            if (!targetStar) {
                return;
            }

            let targetPoet = null;
            let targetGeneral = null;
            let targetEmperor = null;
            let targetDynasty = '';
            let isTargetGeneral = false;
            let isTargetPoet = false;
            let isTargetEmperor = false;

            if (targetStar.userData && targetStar.userData.poet) {
                targetPoet = targetStar.userData.poet;
                isTargetPoet = true;
                const isTargetSong = targetPoet.era && (targetPoet.era.includes('宋') || targetPoet.era.includes('南唐') || targetPoet.era.includes('明末清初'));
                targetDynasty = isTargetSong ? 'song' : 'tang';
            } else if (targetStar.userData && targetStar.userData.general) {
                targetGeneral = targetStar.userData.general;
                isTargetGeneral = true;
                const starType = targetStar.userData.type;
                if (starType === 'song-general') {
                    targetDynasty = 'song-general';
                } else if (starType === 'ming-general') {
                    targetDynasty = 'ming';
                } else {
                    targetDynasty = 'general';
                }
            } else if (targetStar.userData && targetStar.userData.emperor) {
                targetEmperor = targetStar.userData.emperor;
                isTargetEmperor = true;
                targetDynasty = 'emperor';
            }

            const currentIsGeneral = currentCategory === 'general' || currentCategory === 'song-general';
            const currentIsPoet = currentCategory === 'poet';
            const currentIsEmperor = currentCategory === 'emperor';
            const currentIsMingGeneral = currentDynasty === 'ming';

            if (isTargetGeneral && (currentIsGeneral || currentIsMingGeneral)) {
                if (currentDynasty !== targetDynasty) {
                    switchDynasty(targetDynasty);
                    filterStars();
                }
            } else if (isTargetPoet && currentIsPoet) {
                if (currentDynasty !== targetDynasty) {
                    switchDynasty(targetDynasty);
                    filterStars();
                }
            } else if (isTargetEmperor && currentIsEmperor) {
                if (currentDynasty !== targetDynasty) {
                    switchDynasty(targetDynasty);
                    filterStars();
                }
            } else if (isTargetGeneral && currentIsPoet) {
                showGenerals = true;
                showPoets = false;
                showEmperors = false;
                document.querySelectorAll('.legend-item.category-filter').forEach(cItem => {
                    cItem.classList.remove('active', 'inactive');
                    if (cItem.dataset.category === 'general') {
                        cItem.classList.add('active');
                    } else {
                        cItem.classList.add('inactive');
                    }
                });
                switchDynasty(targetDynasty);
                filterStars();
            } else if (isTargetPoet && (currentIsGeneral || currentIsMingGeneral)) {
                showPoets = true;
                showGenerals = false;
                showEmperors = false;
                document.querySelectorAll('.legend-item.category-filter').forEach(cItem => {
                    cItem.classList.remove('active', 'inactive');
                    if (cItem.dataset.category === 'poet') {
                        cItem.classList.add('active');
                    } else {
                        cItem.classList.add('inactive');
                    }
                });
                switchDynasty(targetDynasty);
                filterStars();
            } else if (isTargetEmperor && (currentIsPoet || currentIsGeneral || currentIsMingGeneral)) {
                showEmperors = true;
                showPoets = false;
                showGenerals = false;
                document.querySelectorAll('.legend-item.category-filter').forEach(cItem => {
                    cItem.classList.remove('active', 'inactive');
                    if (cItem.dataset.category === 'emperor') {
                        cItem.classList.add('active');
                    } else {
                        cItem.classList.add('inactive');
                    }
                });
                switchDynasty(targetDynasty);
                filterStars();
            }
            
            setTimeout(() => {
                const currentStars = getCurrentStars();
                let currentTargetStar = null;
                
                if (!isTargetGeneral && !isTargetEmperor) {
                    currentTargetStar = currentStars.find(star => star.userData && star.userData.poet && star.userData.poet.id === poetId);
                } else if (isTargetGeneral) {
                    currentTargetStar = currentStars.find(star => star.userData && star.userData.general && star.userData.general.id === poetId);
                } else if (isTargetEmperor) {
                    currentTargetStar = currentStars.find(star => star.userData && star.userData.emperor && star.userData.emperor.id === poetId);
                }
                
                if (!currentTargetStar) return;
                
                const starPosition = new THREE.Vector3();
                currentTargetStar.getWorldPosition(starPosition);
                
                const targetDir = starPosition.clone().normalize();
                const cameraDir = new THREE.Vector3(0, 0, 1);
                
                const quaternion = new THREE.Quaternion();
                quaternion.setFromUnitVectors(targetDir, cameraDir);
                
                const euler = new THREE.Euler();
                euler.setFromQuaternion(quaternion);
                
                const targetRotationX = sphereRotation.x + euler.x;
                const targetRotationY = sphereRotation.y + euler.y;
                
                const startRotationX = sphereRotation.x;
                const startRotationY = sphereRotation.y;
                const startTime = Date.now();
                const animationDuration = 1200;
                
                function easeOutCubic(t) {
                    return 1 - Math.pow(1 - t, 3);
                }
                
                function animateCamera() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / animationDuration, 1);
                    const easedProgress = easeOutCubic(progress);
                    
                    sphereRotation.x = startRotationX + (targetRotationX - startRotationX) * easedProgress;
                    sphereRotation.y = startRotationY + (targetRotationY - startRotationY) * easedProgress;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animateCamera);
                    } else {
                        highlightStar(currentTargetStar);
                        if (fromRelationClick) {
                            if (isTargetGeneral) {
                                showPoetInfo(targetGeneral, true);
                            } else if (isTargetEmperor) {
                                showPoetInfo(targetEmperor, true);
                            } else {
                                showPoetInfo(targetPoet, true);
                            }
                        }
                    }
                }
                
                animateCamera();
            }, 100);
        }

        function highlightStar(targetStar) {
            const originalOpacity = targetStar.material.opacity;
            let flashCount = 0;
            const flashInterval = setInterval(() => {
                targetStar.material.opacity = flashCount % 2 === 0 ? 1 : 0.5;
                flashCount++;
                if (flashCount >= 6) {
                    clearInterval(flashInterval);
                    targetStar.material.opacity = originalOpacity;
                }
            }, 100);
            
            const originalScale = targetStar.scale.x;
            let scaleCount = 0;
            const scaleInterval = setInterval(() => {
                const scale = scaleCount % 2 === 0 ? originalScale * 1.5 : originalScale;
                targetStar.scale.setScalar(scale);
                scaleCount++;
                if (scaleCount >= 6) {
                    clearInterval(scaleInterval);
                    targetStar.scale.setScalar(originalScale);
                }
            }, 100);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            scene.rotation.x = sphereRotation.x;
            scene.rotation.y = sphereRotation.y;
            
            const currentStars = getCurrentStars();
            currentStars.forEach((star, index) => {
                if (star.userData && star.userData.poet) {
                    const poet = star.userData.poet;
                    const speed = poet.fame === 1 ? 0.004 : poet.fame === 2 ? 0.003 : poet.fame === 3 ? 0.002 : 0.001;
                    const scale = poet.fame === 1 ? 0.3 : poet.fame === 2 ? 0.2 : poet.fame === 3 ? 0.15 : 0.1;
                    const pulse = Math.sin(Date.now() * speed + index * 0.5) * scale + 1;
                    star.scale.setScalar(pulse);
                } else if (star.userData && star.userData.general) {
                    const general = star.userData.general;
                    const speed = general.fame === 1 ? 0.004 : general.fame === 2 ? 0.003 : general.fame === 3 ? 0.002 : 0.001;
                    const scale = general.fame === 1 ? 0.3 : general.fame === 2 ? 0.2 : general.fame === 3 ? 0.15 : 0.1;
                    const pulse = Math.sin(Date.now() * speed + index * 0.5) * scale + 1;
                    star.scale.setScalar(pulse);
                } else if (star.userData && star.userData.emperor) {
                    const emperor = star.userData.emperor;
                    const speed = emperor.fame === 1 ? 0.004 : emperor.fame === 2 ? 0.003 : emperor.fame === 3 ? 0.002 : 0.001;
                    const scale = emperor.fame === 1 ? 0.3 : emperor.fame === 2 ? 0.2 : emperor.fame === 3 ? 0.15 : 0.1;
                    const pulse = Math.sin(Date.now() * speed + index * 0.5) * scale + 1;
                    star.scale.setScalar(pulse);
                }
            });
            
            renderer.render(scene, camera);
        }

        init();

        // 搜索功能
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');
        let searchTimeout;

        searchInput.addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            
            if (query.length === 0) {
                searchResults.classList.remove('show');
                return;
            }
            
            searchTimeout = setTimeout(() => {
                performSearch(query);
            }, 300);
        });

        searchInput.addEventListener('focus', function() {
            if (this.value.trim().length > 0) {
                searchResults.classList.add('show');
            }
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-box')) {
                searchResults.classList.remove('show');
            }
        });

        function performSearch(query) {
            const results = [];
            
            // 搜索诗人
            poetsData.forEach(poet => {
                if (poet.name.includes(query)) {
                    const dynasty = isSongDynasty(poet.era) ? 'song' : 'tang';
                    results.push({
                        id: poet.id,
                        name: poet.name,
                        era: poet.era,
                        type: 'poet',
                        dynasty: dynasty,
                        typeName: '诗人'
                    });
                }
            });
            
            // 搜索将星
            generalsData.forEach(general => {
                if (general.name.includes(query)) {
                    let dynasty;
                    if (general.era === '唐朝') {
                        dynasty = 'general';
                    } else if (general.era === '宋朝') {
                        dynasty = 'song-general';
                    } else if (general.era === '明朝') {
                        dynasty = 'ming';
                    }
                    results.push({
                        id: general.id,
                        name: general.name,
                        era: general.era,
                        type: 'general',
                        dynasty: dynasty,
                        typeName: '将星'
                    });
                }
            });
            
            // 搜索帝王
            emperorsData.forEach(emperor => {
                if (emperor.name.includes(query)) {
                    results.push({
                        id: emperor.id,
                        name: emperor.name,
                        era: emperor.era,
                        type: 'emperor',
                        dynasty: 'emperor',
                        typeName: '皇帝'
                    });
                }
            });
            
            displaySearchResults(results);
        }

        function displaySearchResults(results) {
            if (results.length === 0) {
                searchResults.innerHTML = '<div class="search-no-results">未找到匹配的人物</div>';
                searchResults.classList.add('show');
                return;
            }
            
            let html = '';
            results.forEach(result => {
                html += `
                    <div class="search-result-item" onclick="selectSearchResult(${result.id}, '${result.type}', '${result.dynasty}')">
                        <div class="search-result-name">${result.name}</div>
                        <div class="search-result-info">
                            <span class="search-result-era">${result.era}</span>
                            <span class="search-result-type">${result.typeName}</span>
                        </div>
                    </div>
                `;
            });
            
            searchResults.innerHTML = html;
            searchResults.classList.add('show');
        }

        function selectSearchResult(id, type, dynasty) {
            // 切换到对应的星空
            switchDynasty(dynasty);
            
            // 延迟一下，等待场景切换完成
            setTimeout(() => {
                // 导航到对应的人物
                navigateToPoet(id);
                
                // 显示人物信息
                let person;
                if (type === 'poet') {
                    person = poetsData.find(p => p.id === id);
                } else if (type === 'general') {
                    person = generalsData.find(g => g.id === id);
                } else if (type === 'emperor') {
                    person = emperorsData.find(e => e.id === id);
                }
                
                if (person) {
                    showPoetInfo(person);
                }
                
                // 关闭搜索结果
                searchResults.classList.remove('show');
                searchInput.value = '';
            }, 300);
        }
    </script>
</body>
